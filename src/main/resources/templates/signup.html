<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>
<h1>회원가입</h1>

<div th:if="${error}" style="color:red;" th:text="${error}"></div>

<form th:action="@{/signup}" method="post" th:object="${signupRequestDto}">
    <div>
        <label>아이디: <input type="text" th:field="*{username}"></label>
    </div>
    <div>
        <label>비밀번호: <input type="password" th:field="*{password}"></label>
    </div>
    <div>
        <label>
            <input type="checkbox" th:field="*{admin}"> 관리자로 가입
        </label>
    </div>
    <button type="submit">가입하기</button>
</form>

<a href="/login">로그인으로 돌아가기</a>
</body>
</html>
