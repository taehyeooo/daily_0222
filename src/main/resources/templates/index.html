<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Main Page</title>
</head>
<body>
<h1>메인 페이지</h1>

<div sec:authorize="isAnonymous()">
    <p>환영합니다! 서비스를 이용하려면 로그인해 주세요.</p>
    <a th:href="@{/login}">로그인 페이지로 이동</a>
</div>

<div sec:authorize="isAuthenticated()">
    <p><span sec:authentication="name">사용자</span>님, 환영합니다!</p>
    <form th:action="@{/logout}" method="post">
        <button type="submit">로그아웃</button>
    </form>
</div>

<hr>

<h3>메뉴 이동</h3>
<ul>
    <li><a th:href="@{/product/list}">제품 목록</a></li>

    <li sec:authorize="hasAnyRole('MANAGER', 'ADMIN')">
        <a th:href="@{/product/add}">제품 등록 (매니저/관리자용)</a>
    </li>

    <li sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/member/list}">회원 목록 (관리자용)</a>
    </li>

    <li sec:authorize="hasRole('USER')">
        <a th:href="@{/member/detail}">내 정보 상세 (사용자용)</a>
    </li>
</ul>
</body>
</html>
