<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
</head>
<body>
<h1>게시글 목록</h1>
<a href="/mission3/posts/new">글쓰기</a>
<hr>

<div th:if="${#lists.isEmpty(posts)}">
    <p>등록된 게시글이 없습니다.</p>
</div>

<table th:unless="${#lists.isEmpty(posts)}" border="1">
    <thead>
    <tr>
        <th>번호</th>
        <th>제목</th>
        <th>작성자</th>
        <th>작성일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="post : ${posts}">
        <td th:text="${post.id}"></td>
        <td><a th:href="@{/mission3/posts/{id}(id=${post.id})}" th:text="${post.title}"></a></td>
        <td th:text="${post.author}"></td>
        <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
